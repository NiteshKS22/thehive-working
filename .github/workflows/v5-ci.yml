name: v5 Services CI

on:
  push:
    branches: [ main ]
    paths:
      - 'v5-core/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'v5-core/**'

jobs:
  build-and-test:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r v5-core/alert-ingestion-service/requirements.txt
          pip install -r v5-core/dedup-correlation-service/requirements.txt
          pip install -r v5-core/correlation-service/requirements.txt
          pip install -r v5-core/query-api-service/requirements.txt
          pip install -r v5-core/case-service/requirements.txt
          pip install -r v5-core/v4-sync-service/requirements.txt
          pip install -r v5-core/v5-writeback-publisher/requirements.txt
          pip install -r v4-bridge/v4-inbox-applier/requirements.txt
          pip install -r v4-bridge/v4-outbox-publisher/requirements.txt
          pip install pytest httpx pyyaml pyjwt cryptography fastapi requests

      - name: Test Services (Unit)
        run: |
          pytest v5-core/alert-ingestion-service/tests/
          pytest v5-core/dedup-correlation-service/tests/
          pytest v5-core/correlation-service/tests/
          pytest v5-core/common/auth/tests/
          pytest v5-core/v4-sync-service/tests/
          pytest v5-core/v5-writeback-publisher/tests/

      - name: Build Docker Images
        run: |
          cp -r v5-core/common v5-core/alert-ingestion-service/
          cp -r v5-core/common v5-core/query-api-service/
          cp -r v5-core/common v5-core/case-service/
          cp -r v5-core/common v5-core/v4-sync-service/
          cp -r v5-core/common v5-core/v5-writeback-publisher/
          cp -r v5-core/common v4-bridge/v4-outbox-publisher/ || true

          docker build -t thehive-ingestion:ci v5-core/alert-ingestion-service/
          docker build -t thehive-dedup:ci v5-core/dedup-correlation-service/
          docker build -t thehive-indexer:ci v5-core/opensearch-indexer-service/
          docker build -t thehive-query:ci v5-core/query-api-service/
          docker build -t thehive-correlation:ci v5-core/correlation-service/
          docker build -t thehive-group-indexer:ci v5-core/group-indexer-service/
          docker build -t thehive-case:ci v5-core/case-service/
          docker build -t thehive-v4-sync:ci v5-core/v4-sync-service/
          docker build -t v5-writeback:ci v5-core/v5-writeback-publisher/
          docker build -t v4-applier:ci v4-bridge/v4-inbox-applier/
          docker build -t v4-publisher:ci v4-bridge/v4-outbox-publisher/

      - name: Start v5 Stack
        working-directory: v5-core/event-spine
        run: |
           docker-compose up -d
           sleep 20

      - name: Apply Index Templates
        run: |
          curl -X PUT "http://localhost:9200/_index_template/alerts_template"             -H "Content-Type: application/json"             -d @v5-core/opensearch-indexer-service/OPENSEARCH_INDEX_TEMPLATE.json

          curl -X PUT "http://localhost:9200/_index_template/groups_template"             -H "Content-Type: application/json"             -d @v5-core/group-indexer-service/GROUPS_INDEX_TEMPLATE.json

      - name: Setup v4 Schemas
        run: |
          cat migration/v4_outbox_schema.sql | docker-compose -f v5-core/event-spine/docker-compose.yml exec -T postgres psql -U hive -d thehive
          cat migration/v4_inbox_schema.sql | docker-compose -f v5-core/event-spine/docker-compose.yml exec -T postgres psql -U hive -d thehive

      - name: Generate CI Token
        id: token
        run: |
          # Use local helper to generate token, avoiding hardcoded string
          # Assuming generate_test_token.py exists in .github/scripts or similar,
          # or we mock it securely here.
          # For CI, we will create a temporary generator script.
          cat <<SCRIPT > gen_token.py
          import jwt
          import time
          key = "dev-secret-do-not-use-in-prod"
          token = jwt.encode({
              "sub": "ci-user",
              "tenant_id": "tenant-A",
              "roles": ["SOC_ANALYST", "CASE_WRITE"],
              "exp": int(time.time()) + 3600,
              "iss": "thehive-ci"
          }, key, algorithm="HS256")
          print(token)
          SCRIPT

          TOKEN=$(python3 gen_token.py)
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT

      - name: Start App Services
        run: |
          NETWORK_NAME="event-spine_default"

          docker run -d --name ingestion-service --network $NETWORK_NAME             -p 8000:8000             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e JWT_SECRET="dev-secret-do-not-use-in-prod"             thehive-ingestion:ci

          docker run -d --name query-service --network $NETWORK_NAME             -p 8001:8001             -e OPENSEARCH_HOST=opensearch             -e POSTGRES_HOST=postgres             -e POSTGRES_PASSWORD=hive             -e JWT_SECRET="dev-secret-do-not-use-in-prod"             thehive-query:ci

          docker run -d --name case-service --network $NETWORK_NAME             -p 8002:8000             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e POSTGRES_HOST=postgres             -e POSTGRES_PASSWORD=hive             -e JWT_SECRET="dev-secret-do-not-use-in-prod"             thehive-case:ci

          docker run -d --name v4-sync-service --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e OPENSEARCH_HOST=opensearch             thehive-v4-sync:ci

          docker run -d --name dedup-service --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e REDIS_HOST=redis             thehive-dedup:ci

          docker run -d --name indexer-service --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e OPENSEARCH_HOST=opensearch             thehive-indexer:ci

          docker run -d --name correlation-service --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e POSTGRES_HOST=postgres             -e POSTGRES_PASSWORD=hive             thehive-correlation:ci

          docker run -d --name group-indexer-service --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e OPENSEARCH_HOST=opensearch             thehive-group-indexer:ci

          docker run -d --name v5-writeback --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e V5_WRITEBACK_ENABLED=true             v5-writeback:ci

          docker run -d --name v4-applier --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e V5_WRITEBACK_ENABLED=true             -e V4_DB_HOST=postgres             -e V4_DB_PASSWORD=hive             v4-applier:ci

          docker run -d --name v4-publisher --network $NETWORK_NAME             -e KAFKA_BOOTSTRAP_SERVERS=redpanda:29092             -e V4_DB_HOST=postgres             -e V4_DB_PASSWORD=hive             v4-publisher:ci

          sleep 10

      - name: Verify UI Routing Targets
        env:
          TOKEN: ${{ steps.token.outputs.TOKEN }}
        run: |
          docker run --network event-spine_default             -v $(pwd)/.github/scripts:/scripts             -e QUERY_API_URL=http://query-service:8001             -e AUTH_TOKEN="$TOKEN"             python:3.10-slim sh -c "pip install requests && python /scripts/verify_ui_routing.py"

      - name: Stop Stack
        if: always()
        working-directory: v5-core/event-spine
        run: docker-compose down

      - name: Verify DLQ Manager
        run: |
           python3 v5-core/scripts/v5_dlq_manager.py --help
           # Mock replay test?
           # Just verifying it runs is enough for T4 scope
