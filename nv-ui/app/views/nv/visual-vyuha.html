<div class="nv-visual-vyuha-container"
    style="display: flex; height: 100vh; overflow: hidden; background-color: #f4f6f9;">

    <!-- Main Graph Area -->
    <div style="flex: 1; position: relative;" id="cy-container">
        <!-- Cytoscape will render here -->
    </div>

    <!-- Quick-Triage Sidebar -->
    <div class="nv-quick-triage-sidebar"
        style="width: 350px; background: white; border-left: 1px solid #ddd; padding: 20px; box-shadow: -2px 0 5px rgba(0,0,0,0.05); overflow-y: auto;"
        ng-show="vm.selectedNode">
        <div class="sidebar-header"
            style="border-bottom: 2px solid #3c8dbc; padding-bottom: 10px; margin-bottom: 20px;">
            <h3 style="margin: 0; color: #333;"><i class="fa fa-info-circle text-primary"></i> Observable Details</h3>
        </div>

        <div class="node-details">
            <div class="detail-group" style="margin-bottom: 15px;">
                <label style="color: #777; font-size: 12px; text-transform: uppercase;">ID</label>
                <div
                    style="font-family: monospace; word-break: break-all; background: #f9f9f9; padding: 5px; border-radius: 3px;">
                    {{vm.selectedNode.id}}</div>
            </div>

            <div class="detail-group" style="margin-bottom: 15px;">
                <label style="color: #777; font-size: 12px; text-transform: uppercase;">Type</label>
                <div style="font-weight: bold;">
                    <span class="label label-info">{{vm.selectedNode.data.type || 'Unknown'}}</span>
                </div>
            </div>

            <div class="detail-group" style="margin-bottom: 15px;" ng-if="vm.selectedNode.data.sha256">
                <label style="color: #777; font-size: 12px; text-transform: uppercase;">SHA-256</label>
                <div
                    style="font-family: monospace; word-break: break-all; font-size: 12px; background: #f0f4f8; padding: 8px; border: 1px solid #ddecfa; border-radius: 4px;">
                    {{vm.selectedNode.data.sha256}}
                </div>
            </div>

            <div class="detail-group" style="margin-bottom: 15px;">
                <label style="color: #777; font-size: 12px; text-transform: uppercase;">Sighting History</label>
                <div ng-if="vm.selectedNode.data.sightings > 0" style="color: #d9534f; font-weight: bold;">
                    <i class="fa fa-exclamation-triangle"></i> Seen in {{vm.selectedNode.data.sightings}} other cases
                </div>
                <div ng-if="!vm.selectedNode.data.sightings" style="color: #5cb85c;">
                    <i class="fa fa-check-circle"></i> No prior sightings
                </div>
            </div>

            <button class="btn btn-primary btn-block" style="margin-top: 20px;">
                Launch Enrichment
            </button>
        </div>
    </div>

    <!-- Empty State for Sidebar -->
    <div class="nv-quick-triage-sidebar"
        style="width: 350px; background: #fcfcfc; border-left: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #999;"
        ng-show="!vm.selectedNode">
        <i class="fa fa-mouse-pointer fa-3x" style="margin-bottom: 15px; color: #ccc;"></i>
        <h4>Select a node</h4>
        <p>Click on any node in the graph to view its details, hashes, and sighting history.</p>
    </div>
</div>
